// 1. Keep the Sloth plugin for hot-reloading
plugins {
    id 'dev.frozenmilk.sinister.sloth.load' version '0.2.4'
}

// 2. RESTORE THE ORIGINAL SDK LINKS
// These files are essential for your code to "see" OpMode, HardwareMap, etc.
apply from: '../build.common.gradle'
apply from: '../build.dependencies.gradle'

// 3. Restore the Android configuration
android {
    namespace = 'org.firstinspires.ftc.teamcode'
    packagingOptions {
        jniLibs.useLegacyPackaging true
    }
}

// 4. Manually declare your cutting-edge libraries
dependencies {
    // CRITICAL: This line links your code to the FTC SDK module
    implementation project(':FtcRobotController')

    // Sloth & Sinister (Essential for <2s Hot-Reloading)
    implementation "dev.frozenmilk.sinister:Sloth:0.2.4"

    // Panels (The Sloth-specific version is required to avoid crashes)
    implementation "com.bylazar.sloth:fullpanels:0.2.4+1.0.12"

    // SolversLib & Pedro Pathing Integration
    implementation "org.solverslib:core:0.3.4"
    implementation "org.solverslib:pedroPathing:0.3.4"

    // Pedro Pathing Core & Telemetry
    implementation "com.pedropathing:ftc:2.0.6"
    implementation "com.pedropathing:telemetry:1.0.0"
}